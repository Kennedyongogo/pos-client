<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1640" />
    <meta name="description" content="Carlynve POS System" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Carlynve POS</title>
    <style>
      #app-loader {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0c0a1d 0%, #1a1640 50%, #231d5e 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: white;
      }
      #app-loader .logo {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #6c5ce7, #302b63);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 24px;
        margin-bottom: 20px;
        box-shadow: 0 12px 32px rgba(108, 92, 231, 0.4);
      }
      #app-loader h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 800;
      }
      #app-loader p {
        margin: 0;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
      }
      #app-loader .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #6c5ce7;
        border-radius: 50%;
        margin-top: 28px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="app-loader">
        <div class="logo">CP</div>
        <h1>Carlynve POS</h1>
        <p>Loading...</p>
        <div class="spinner"></div>
      </div>
    </div>
    <script>
      (function () {
        console.log('[POS Boot]', '0/4 HTML loaded', {
          url: window.location.href,
          port: window.location.port || '(default)',
          scripts: document.scripts.length
        });

        var host = window.location.hostname;
        if (host !== 'localhost' && host !== '127.0.0.1') return;
        if (sessionStorage.getItem('pos_boot_retry')) {
          console.log('[POS Boot]', 'Auto-reload already tried this session');
          return;
        }

        window.addEventListener('load', function () {
          console.log('[POS Boot]', 'window load fired', { scripts: document.scripts.length });
          setTimeout(function () {
            var loader = document.getElementById('app-loader');
            var root = document.getElementById('root');
            if (loader && root && root.contains(loader)) {
              console.warn('[POS Boot]', 'WHITE SCREEN FIX: React did not mount in 3s — reloading once', {
                reason: 'JS bundle likely not ready (wrong port or stale dev server)',
                port: window.location.port,
                scriptCount: document.scripts.length
              });
              sessionStorage.setItem('pos_boot_retry', '1');
              window.location.reload();
            } else {
              console.log('[POS Boot]', 'Loader replaced — React mounted OK');
            }
          }, 3000);
        });
      })();
    </script>
  </body>
</html>
